name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: openskulls-linux-x64
            runs-on: ubuntu-latest
          - target: bun-linux-arm64
            artifact: openskulls-linux-arm64
            runs-on: ubuntu-24.04-arm   # native arm64 — no cross-compile download
          - target: bun-darwin-x64
            artifact: openskulls-darwin-x64
            runs-on: ubuntu-latest
          - target: bun-darwin-arm64
            artifact: openskulls-darwin-arm64
            runs-on: ubuntu-latest
          - target: bun-windows-x64
            artifact: openskulls-windows-x64.exe
            runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate templates
        run: bun scripts/gen-templates.ts

      - name: Compile binary
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
